<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RFInv Web{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f6f9; overflow-x: hidden; }
        #sidebar { min-width: 260px; max-width: 260px; min-height: 100vh; transition: all 0.3s ease-in-out; background: #2c3e50; color: #ecf0f1; z-index: 1000; }
        #sidebar.collapsed { margin-left: -260px; }
        #sidebar .sidebar-header { padding: 20px; background: #1a252f; }
        #sidebar ul li a { padding: 15px 20px; font-size: 1.1em; display: block; color: rgba(255,255,255,0.7); text-decoration: none; transition: 0.2s; }
        #sidebar ul li a:hover, #sidebar ul li.active > a { color: #fff; background: #34495e; border-left: 4px solid #3498db; }
        #content { width: 100%; padding: 20px; min-height: 100vh; transition: all 0.3s; }
        .wrapper { display: flex; width: 100%; align-items: stretch; }
        .card-custom { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        @media (max-width: 768px) {
            #sidebar { position: absolute; margin-left: -260px; }
            #sidebar.mobile-show { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="fas fa-boxes me-2"></i> ระบบบริหารสินค้าคงคลัง</h4>
            <button type="button" id="sidebarCloseBtn" class="btn btn-sm btn-outline-light d-md-none"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-4 text-center border-bottom border-secondary">
            <i class="fas fa-user-circle fa-3x mb-2 text-info"></i>
            <h5 class="mt-2">{{ request.user.username }}</h5>
        </div>
        <ul class="list-unstyled mt-3">
            <li class="{% if request.resolver_match.url_name == 'web_dashboard' %}active{% endif %}">
                <a href="{% url 'web_dashboard' %}"><i class="fas fa-tachometer-alt me-3"></i> Dashboard</a>
            </li>
            <li class="{% if request.resolver_match.url_name == 'web_inventory' %}active{% endif %}">
                <a href="{% url 'web_inventory' %}"><i class="fas fa-box-open me-3"></i> สินค้า (Inventory)</a>
            </li>
            <li class="{% if request.resolver_match.url_name == 'web_inspection_history' %}active{% endif %}">
                <a href="{% url 'web_inspection_history' %}"><i class="fas fa-clipboard-check me-3"></i> ประวัติการตรวจสอบ</a>
            </li>
            <li class="{% if request.resolver_match.url_name == 'report_dashboard' %}active{% endif %}">
                <a href="{% url 'rvapi:report_dashboard' %}"><i class="fas fa-print me-3"></i> ออกรายงาน (Reports)</a>
            </li>
            <li class="mt-4">
                <a href="{% url 'web_logout' %}"><i class="fas fa-power-off me-3 text-danger"></i> ออกจากระบบ</a>
            </li>
        </ul>
    </nav>

    <!-- Page Content -->
    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 shadow-sm mb-4 p-3">
            <div class="d-flex align-items-center w-100">
                <button type="button" id="sidebarCollapse" class="btn btn-outline-primary me-3"><i class="fas fa-bars"></i></button>
                <h4 class="mb-0 text-dark">{% block page_title %}Page Title{% endblock %}</h4>
            </div>
        </nav>

        <!-- Main Content Block -->
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const sidebar = document.getElementById('sidebar');
    document.getElementById('sidebarCollapse').addEventListener('click', () => {
        if(window.innerWidth <= 768) sidebar.classList.toggle('mobile-show');
        else sidebar.classList.toggle('collapsed');
    });
    document.getElementById('sidebarCloseBtn').addEventListener('click', () => sidebar.classList.remove('mobile-show'));
</script>
</body>
</html>
