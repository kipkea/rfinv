{% extends 'base.html' %}

{% block title %}Dashboard - RFInv{% endblock %}
{% block page_title %}Dashboard{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card text-white bg-primary card-custom h-100">
            <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                <i class="fas fa-boxes fa-3x mb-3 opacity-75"></i>
                <h5 class="card-title">จำนวนสินค้าทั้งหมด</h5>
                <h1 class="display-4 fw-bold">{{ inv_count }}</h1>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-4">
        <div class="card text-white bg-success card-custom h-100">
            <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                <i class="fas fa-map-marker-alt fa-3x mb-3 opacity-75"></i>
                <h5 class="card-title">จำนวนสถานที่ลงทะเบียน</h5>
                <h1 class="display-4 fw-bold">{{ loc_count }}</h1>
            </div>
        </div>
    </div>
    <!-- ส่วนข้อมูลสรุปการตรวจสอบอื่นๆ สามารถดึงผ่าน context มาใส่แบบเดียวกันได้ -->
</div>
{% endblock %}
